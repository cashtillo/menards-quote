<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Menards Tools</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', sans-serif;
    background: #1a1a2e;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
  }
  .logo { text-align: center; margin-bottom: 40px; }
  .logo h1 { font-size: 28px; font-weight: 800; color: #fff; letter-spacing: 0.5px; }
  .logo p { font-size: 14px; color: #888; margin-top: 6px; }
  .tools {
    display: flex;
    gap: 20px;
    flex-wrap: wrap;
    justify-content: center;
    max-width: 700px;
    width: 100%;
  }
  .tool-card {
    background: #fff;
    border-radius: 16px;
    padding: 32px 28px;
    flex: 1;
    min-width: 260px;
    max-width: 320px;
    text-decoration: none;
    color: inherit;
    box-shadow: 0 16px 48px rgba(0,0,0,0.4);
    transition: transform 0.2s, box-shadow 0.2s;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .tool-card:hover { transform: translateY(-4px); box-shadow: 0 24px 64px rgba(0,0,0,0.5); }
  .tool-icon { font-size: 32px; margin-bottom: 4px; }
  .tool-card h2 { font-size: 18px; font-weight: 700; color: #1a1a2e; }
  .tool-card p { font-size: 13px; color: #666; line-height: 1.5; }
  .tool-badge {
    display: inline-block;
    margin-top: 8px;
    background: #009b3a;
    color: white;
    font-size: 12px;
    font-weight: 600;
    padding: 4px 10px;
    border-radius: 20px;
    align-self: flex-start;
  }
</style>
</head>
<body>
<div class="logo">
  <h1>Menards Tools</h1>
  <p>Select a tool to get started</p>
</div>
<div class="tools">
  <a class="tool-card" href="calculator.html">
    <div class="tool-icon">&#x1F9EE;</div>
    <h2>Quote Calculator</h2>
    <p>Enter subtotal and delivery to calculate tax, rebate, and total due.</p>
    <span class="tool-badge">Open &rarr;</span>
  </a>
  <a class="tool-card" href="bidroom.html">
    <div class="tool-icon">&#x1F4CB;</div>
    <h2>Bidroom Estimating Tool</h2>
    <p>Line-item estimating with GMP tracking, smart price reducer, and rebate panel.</p>
    <span class="tool-badge">Open &rarr;</span>
  </a>
</div>
</body>
</html>
